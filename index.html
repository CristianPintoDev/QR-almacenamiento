<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API de Contenedores</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
    <h1>API de Contenedores</h1>
    <form id="form_contenedor">
        <input type="text" id="contenedor_nombre" placeholder="Nombre del Contenedor" required>
    </form>
    <form id="article-form">
        <input type="text" id="article-name" placeholder="Nombre del artículo" required>
        <button type="submit">Agregar Artículo</button>
    </form>
    <div id="articles-container"></div>
    <button id="generate-qr">Generar Código QR</button>
    <div id="qr-code"></div>
    <script src="app.js"></script>
</body>
</html>
